<button onclick="changeBg()">Change Background</button>

<script>
let originalBg = getComputedStyle(document.body).backgroundColor;

let items = [
  { type: "color", value: "red" },
  { type: "color", value: "purple" },
  { type: "color", value: "blue" },
  { type: "image", value: "download (3).png" }
];

let i = 0;

function changeBg() {
  if (i < items.length) {
    if (items[i].type === "color") {
      document.body.style.backgroundImage = "none";
      document.body.style.backgroundColor = items[i].value;
    } else {
      document.body.style.backgroundImage = "url('" + items[i].value + "')";
      document.body.style.backgroundSize = "cover";
      document.body.style.backgroundPosition = "center";
    }
  } else {
    // back to original
    document.body.style.backgroundImage = "none";
    document.body.style.backgroundColor = originalBg;
  }

  i = (i + 1) % (items.length + 1);
}
</script>
